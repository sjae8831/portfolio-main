<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Management - 품질관리 업무관리</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F1F5F9; color: #1E293B; min-height: 100vh;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

.header { background: #fff; border-bottom: 1px solid #E2E8F0; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1200px; margin: 0 auto; }
.header-top { display: flex; align-items: center; padding: 16px 0 0; gap: 12px; }
.logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #1E40AF, #3B82F6); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; font-weight: 800; }
.header-title { font-size: 18px; font-weight: 800; color: #1E293B; letter-spacing: -0.3px; }
.header-sub { font-size: 11px; color: #94A3B8; font-weight: 500; }
.tabs { display: flex; gap: 0; margin-top: 12px; overflow-x: auto; }
.tab-btn { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; color: #64748B; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.tab-btn.active { color: #1E40AF; font-weight: 700; border-bottom-color: #1E40AF; }
.tab-btn:hover:not(.active) { color: #334155; }
.tab-count { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; background: #E2E8F0; color: #64748B; }
.tab-btn.active .tab-count { background: #1E40AF; color: #fff; }
.content { max-width: 1200px; margin: 0 auto; padding: 20px 24px 40px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: #fff; border-radius: 12px; padding: 14px 16px; border: 1px solid #E2E8F0; display: flex; align-items: center; gap: 12px; }
.stat-icon { font-size: 22px; }
.stat-label { font-size: 11px; color: #94A3B8; font-weight: 600; margin-bottom: 2px; }
.stat-value { font-size: 22px; font-weight: 800; }

.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 28px; }
.dash-card { background: #fff; border-radius: 14px; padding: 20px; cursor: pointer; border: 1px solid #E2E8F0; transition: all 0.2s; position: relative; overflow: hidden; }
.dash-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.dash-card .bg-circle { position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; opacity: 0.6; }
.dash-card-icon { font-size: 28px; margin-bottom: 10px; }
.dash-card-title { font-size: 15px; font-weight: 700; color: #1E293B; margin-bottom: 4px; }
.dash-card-desc { font-size: 12px; color: #94A3B8; margin-bottom: 12px; }
.dash-card-count { font-size: 28px; font-weight: 800; }
.dash-card-unit { font-size: 12px; color: #94A3B8; }

.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filters .spacer { flex: 1; }

input, select, textarea { font-family: inherit; font-size: 14px; padding: 10px 12px; border-radius: 8px; border: 1px solid #CBD5E1; outline: none; transition: border-color 0.15s; }
input:focus, select:focus, textarea:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
select { background: #fff; }
textarea { resize: vertical; }
.input-sm { width: 240px; }
.input-md { width: 260px; }
.select-sm { width: 120px; }
.select-md { width: 140px; }
.input-full { width: 100%; }

.btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; transition: all 0.15s; }
.btn-primary { background: #1E40AF; color: #fff; }
.btn-primary:hover { background: #1E3A8A; }
.btn-secondary { background: #F1F5F9; color: #475569; }
.btn-secondary:hover { background: #E2E8F0; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-danger { background: #FEE2E2; color: #DC2626; }
.btn-danger:hover { background: #FECACA; }
.btn-icon { border: none; background: none; cursor: pointer; font-size: 14px; padding: 4px; transition: opacity 0.15s; }
.btn-icon:hover { opacity: 0.7; }

.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #E2E8F0; background: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: #F8FAFC; }
th { padding: 10px 12px; text-align: left; font-weight: 700; color: #64748B; font-size: 12px; border-bottom: 1px solid #E2E8F0; white-space: nowrap; }
td { padding: 10px 12px; }
tbody tr { border-bottom: 1px solid #F1F5F9; transition: background 0.1s; }
tbody tr:hover { background: #F8FAFC; }
.td-bold { font-weight: 600; color: #1E293B; }
.td-mono { font-family: monospace; font-size: 12px; }
.td-dim { font-size: 12px; color: #64748B; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-right { text-align: right; }
.td-nowrap { white-space: nowrap; }
.td-sub { font-size: 11px; color: #94A3B8; }
.td-overdue { color: #DC2626; font-weight: 700; }
.empty-row { padding: 40px; text-align: center; color: #94A3B8; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-대기 { background: #FEF3C7; color: #92400E; border: 1px solid #F59E0B; }
.badge-진행중 { background: #DBEAFE; color: #1E40AF; border: 1px solid #3B82F6; }
.badge-완료 { background: #D1FAE5; color: #065F46; border: 1px solid #10B981; }
.badge-보류 { background: #FEE2E2; color: #991B1B; border: 1px solid #EF4444; }
.badge-긴급 { background: #FDE8E8; color: #9B1C1C; border: 1px solid #DC2626; }
.badge-합격 { background: #D1FAE5; color: #065F46; }
.badge-불합격 { background: #FEE2E2; color: #991B1B; }
.badge-조건부합격 { background: #FEF3C7; color: #92400E; }
.badge-type { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; background: #F0F9FF; color: #0369A1; }
.badge-category { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; background: #EDE9FE; color: #5B21B6; }

.priority { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; }
.priority-high { color: #EF4444; }
.priority-high .priority-dot { background: #EF4444; }
.priority-medium { color: #F59E0B; }
.priority-medium .priority-dot { background: #F59E0B; }
.priority-low { color: #6B7280; }
.priority-low .priority-dot { background: #6B7280; }

.card-list { display: grid; gap: 12px; }
.card-item { background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 16px; transition: box-shadow 0.15s; }
.card-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-tags { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.card-meta { display: flex; gap: 16px; font-size: 13px; color: #64748B; margin-bottom: 8px; flex-wrap: wrap; }
.card-meta strong { color: #1E293B; }
.card-content { font-size: 14px; color: #334155; line-height: 1.6; }
.card-action { margin-top: 8px; padding: 8px 12px; background: #F0FDF4; border-radius: 8px; font-size: 13px; color: #166534; }

.alert-banner { background: #FFF7ED; border: 1px solid #FDBA74; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #9A3412; display: flex; align-items: center; gap: 8px; }

.modal-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(15,23,42,0.55); backdrop-filter: blur(4px); }
.modal-box { background: #fff; border-radius: 16px; max-height: 88vh; overflow: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.25); animation: modalIn 0.2s ease-out; }
@keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-header { padding: 20px 24px; border-bottom: 1px solid #E2E8F0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 16px 16px 0 0; }
.modal-title { font-size: 17px; font-weight: 700; color: #1E293B; }
.modal-close { border: none; background: #F1F5F9; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px; color: #64748B; display: flex; align-items: center; justify-content: center; }
.modal-body { padding: 24px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
.field { margin-bottom: 16px; }
.field-label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #475569; }
.field-label .req { color: #EF4444; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.detail-label { font-size: 11px; color: #94A3B8; font-weight: 600; margin-bottom: 2px; }
.detail-value { font-size: 14px; color: #1E293B; font-weight: 500; }
.detail-section { margin-bottom: 12px; }
.detail-section-label { font-size: 11px; color: #94A3B8; font-weight: 600; margin-bottom: 4px; }
.detail-box { font-size: 13px; color: #334155; background: #F8FAFC; border-radius: 8px; padding: 12px; }

.timeline { border-left: 2px solid #E2E8F0; padding-left: 16px; }
.timeline-item { margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B82F6; margin-left: -20px; flex-shrink: 0; }
.timeline-date { font-size: 12px; color: #64748B; }
.timeline-action { font-size: 13px; font-weight: 600; color: #334155; }

.summary-box { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; padding: 20px; }
.summary-title { font-size: 15px; font-weight: 700; color: #1E293B; margin-bottom: 12px; }
.summary-text { font-size: 13px; color: #64748B; line-height: 1.8; }

/* ─── 파일 업로드 영역 ─── */
.upload-zone {
  border: 2px dashed #CBD5E1; border-radius: 12px; padding: 20px; text-align: center;
  cursor: pointer; transition: all 0.2s; background: #FAFBFC; margin-top: 8px;
}
.upload-zone:hover, .upload-zone.dragover { border-color: #3B82F6; background: #EFF6FF; }
.upload-zone-icon { font-size: 32px; margin-bottom: 8px; }
.upload-zone-text { font-size: 13px; color: #64748B; }
.upload-zone-hint { font-size: 11px; color: #94A3B8; margin-top: 4px; }

.file-list { margin-top: 12px; }
.file-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: #F8FAFC; border-radius: 8px; margin-bottom: 6px; border: 1px solid #E2E8F0;
}
.file-thumb {
  width: 40px; height: 40px; border-radius: 6px; object-fit: cover;
  background: #E2E8F0; display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; overflow: hidden;
}
.file-thumb img { width: 100%; height: 100%; object-fit: cover; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 13px; font-weight: 600; color: #1E293B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-size: 11px; color: #94A3B8; }
.file-actions { display: flex; gap: 4px; flex-shrink: 0; }

.attach-count {
  display: inline-flex; align-items: center; gap: 3px; font-size: 11px;
  color: #3B82F6; font-weight: 600;
}

/* 이미지 미리보기 모달 */
.preview-overlay {
  position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.preview-overlay img {
  max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

@media (max-width: 640px) {
  .form-grid { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  .header { padding: 0 12px; }
  .content { padding: 12px 12px 40px; }
  .modal-box { width: calc(100vw - 16px) !important; }
  .input-sm, .input-md { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">Q</div>
      <div>
        <div class="header-title">QC Management</div>
        <div class="header-sub">플라스틱 필름 품질관리 시스템</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>
<div class="content" id="app"></div>
<div id="modal-root"></div>
<div id="preview-root"></div>

<script>
// ─── State ─────────────────────────
const state = {
  tab: 0,
  counts: { defects: 0, tests: 0, certs: 0, requests: 0 },
  data: { defects: [], tests: [], certs: [], requests: [], issues: [], meetings: [], returns: [] },
  filters: {
    defects: { status: '', type: '', search: '' },
    tests: { status: '', search: '' },
    certs: { search: '', category: '' },
    requests: { status: '', type: '', search: '' },
    issues: { status: '', category: '', search: '' },
    meetings: { type: '', search: '' },
    returns: { status: '', search: '' },
  },
};

const TABLES = ['defects', 'tests', 'certs', 'requests', 'issues', 'meetings', 'returns'];
const TAB_INFO = [
  { label: '대시보드', icon: '📊', key: null },
  { label: '불량 현황', icon: '🔍', key: 'defects' },
  { label: '시험 의뢰', icon: '🧪', key: 'tests' },
  { label: '성적서 특이사항', icon: '📋', key: 'certs' },
  { label: '영업 요청건', icon: '📨', key: 'requests' },
  { label: '이슈사항', icon: '⚠️', key: 'issues' },
  { label: '회의록', icon: '📝', key: 'meetings' },
  { label: '반품현황', icon: '🔄', key: 'returns' },
  { label: '불량집계', icon: '📈', key: 'analytics' },
];
const STATUS_LIST = ['대기', '진행중', '완료', '보류', '긴급'];
const DEFECT_TYPES = ['겔','탄화물','처리불량','처짐','권취미터 부족','권취불량','두께불량','주름불량','표면불량','박리','스크래치','슬립불량','블로킹불량','이물','기타'];
const TEST_TYPES = ['인장강도','열수축률','마찰계수','헤이즈','광택도','수분투과율','산소투과율','열경사','내열성','박리강도','충격강도','기타'];
const CERT_CATEGORIES = ['규격 변경','측정값 이상','고객 클레임','재시험 필요','장비 이상','기타'];
const REQUEST_TYPES = ['TDS 요청','PFAS 성적서','CoA 요청','MSDS 요청','샘플 요청','규격확인','인증서류','기타'];
const DEPARTMENTS = ['영업팀','기술팀','생산팀','구매팀','연구소','경영지원','기타'];
const ISSUE_CATEGORIES = ['설비 고장','설비 이상','원료 문제','공정 이상','안전 사고','환경 이슈','품질 이슈','인력 문제','공지사항','기타'];
const MEETING_TYPES = ['정기회의','긴급회의','품질회의','생산회의','안전회의','고객미팅','공정개선','교육/훈련','기타'];
const RETURN_REASONS = ['품질불량','규격미달','외관불량','포장불량','오배송','납기지연','고객변심','기타'];
const PRIORITY_LABELS = { high: '긴급', medium: '보통', low: '낮음' };
const IMAGE_EXTS = ['.jpg','.jpeg','.png','.gif','.bmp','.webp'];

// ─── API ─────────────────────────
const api = {
  async getAll(t) { return (await fetch(`/api/${t}`)).json(); },
  async create(t, d) { return (await fetch(`/api/${t}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) })).json(); },
  async update(t, id, d) { return (await fetch(`/api/${t}/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) })).json(); },
  async remove(t, id) { return (await fetch(`/api/${t}/${id}`, { method:'DELETE' })).json(); },
  async upload(t, parentId, files) {
    const fd = new FormData();
    for (const f of files) fd.append('file', f);
    return (await fetch(`/api/upload/${t}/${parentId}`, { method:'POST', body: fd })).json();
  },
  async getAttachments(t, parentId) { return (await fetch(`/api/attachments/${t}/${parentId}`)).json(); },
  async deleteAttachment(id) { return (await fetch(`/api/attachment/${id}`, { method:'DELETE' })).json(); },
};

// ─── Helpers ─────────────────────────
const uuid = () => crypto.randomUUID?.() || Date.now().toString(36) + Math.random().toString(36).slice(2);
const today = () => new Date().toISOString().split('T')[0];
const nowStr = () => new Date().toISOString().replace('T',' ').slice(0,19);
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// 한글 검색 입력 처리 (조합 중 끊김 방지)
let _searchTimer = null;
let _isComposing = false;
function setupSearch(inputEl, filterPath) {
  if (!inputEl) return;
  inputEl.addEventListener('compositionstart', () => { _isComposing = true; });
  inputEl.addEventListener('compositionend', (e) => {
    _isComposing = false;
    const keys = filterPath.split('.');
    let obj = state.filters;
    for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
    obj[keys[keys.length-1]] = e.target.value;
    renderContent();
  });
  inputEl.addEventListener('input', (e) => {
    if (_isComposing) return;
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => {
      const keys = filterPath.split('.');
      let obj = state.filters;
      for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
      obj[keys[keys.length-1]] = e.target.value;
      renderContent();
    }, 150);
  });
}
function badge(s) { return `<span class="badge badge-${esc(s)}">${esc(s)}</span>`; }
function priorityHtml(p) { return `<span class="priority priority-${p}"><span class="priority-dot"></span>${PRIORITY_LABELS[p]||p}</span>`; }
function judgmentBadge(j) { return j ? `<span class="badge badge-${esc(j)}">${esc(j)}</span>` : '-'; }
function selectOptions(list, sel, empty) {
  let h = empty ? `<option value="">${empty}</option>` : '';
  list.forEach(v => { h += `<option${v===sel?' selected':''}>${esc(v)}</option>`; });
  return h;
}
function isOverdue(d,s) { return d && new Date(d)<new Date() && s!=='완료'; }
function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function isImage(name) { const ext = '.'+name.split('.').pop().toLowerCase(); return IMAGE_EXTS.includes(ext); }
function fileIcon(name) {
  const ext = '.'+name.split('.').pop().toLowerCase();
  if (IMAGE_EXTS.includes(ext)) return '🖼️';
  if (['.pdf'].includes(ext)) return '📕';
  if (['.doc','.docx','.hwp'].includes(ext)) return '📄';
  if (['.xls','.xlsx','.csv'].includes(ext)) return '📊';
  if (['.ppt','.pptx'].includes(ext)) return '📑';
  if (['.zip','.rar','.7z'].includes(ext)) return '📦';
  return '📎';
}

// ─── 파일 업로드 컴포넌트 HTML ─────────────────────────
function uploadZoneHtml(zoneId) {
  return `
    <div class="field">
      <label class="field-label">📎 첨부파일</label>
      <div class="upload-zone" id="${zoneId}"
        onclick="document.getElementById('${zoneId}-input').click()"
        ondragover="event.preventDefault();this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')"
        ondrop="event.preventDefault();this.classList.remove('dragover');handleFileDrop(event,'${zoneId}')">
        <div class="upload-zone-icon">📁</div>
        <div class="upload-zone-text">클릭하여 파일 선택 또는 여기에 드래그</div>

        accept=".jpg,.jpeg,.png,.gif,.bmp,.webp,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.hwp,.zip,.rar,.7z"
        onchange="handleFileSelect(this.files,'${zoneId}')">
      <div class="file-list" id="${zoneId}-pending"></div>
    </div>
  `;
}

// 저장 전 대기 파일 목록 (메모리)
let pendingFiles = [];

function handleFileSelect(files, zoneId) {
  for (const f of files) pendingFiles.push(f);
  renderPendingFiles(zoneId);
}
function handleFileDrop(event, zoneId) {
  const files = event.dataTransfer.files;
  for (const f of files) pendingFiles.push(f);
  renderPendingFiles(zoneId);
}
function removePendingFile(idx, zoneId) {
  pendingFiles.splice(idx, 1);
  renderPendingFiles(zoneId);
}
function renderPendingFiles(zoneId) {
  const el = $(zoneId + '-pending');
  if (!el) return;
  if (pendingFiles.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = pendingFiles.map((f, i) => `
    <div class="file-item">
      <div class="file-thumb">${isImage(f.name) ? '🖼️' : fileIcon(f.name)}</div>
      <div class="file-info">
        <div class="file-name">${esc(f.name)}</div>
        <div class="file-meta">${formatSize(f.size)} · 업로드 대기</div>
      </div>
      <div class="file-actions">
        <button class="btn btn-sm btn-danger" onclick="removePendingFile(${i},'${zoneId}')">삭제</button>
      </div>
    </div>
  `).join('');
}

async function deleteAttachment(fileId) {

}

// ─── Tabs ─────────────────────────
function renderTabs() {
  const el = $('tabs');
  el.innerHTML = TAB_INFO.map((t, i) => {
    const active = state.tab === i ? ' active' : '';
    const k = t.key;
    const count = k ? state.counts[k] || 0 : 0;
    const ch = i > 0 && count > 0 ? `<span class="tab-count">${count}</span>` : '';
    return `<button class="tab-btn${active}" onclick="switchTab(${i})"><span style="font-size:15px">${t.icon}</span>${t.label}${ch}</button>`;
  }).join('');
}
function switchTab(i) { state.tab = i; renderTabs(); renderContent(); }

async function loadAll() {
  const r = await Promise.all(TABLES.map(t => api.getAll(t)));
  TABLES.forEach((t, i) => { state.data[t] = r[i]; state.counts[t] = r[i].length; });
}

function renderContent() {
  const el = $('app');
  // 현재 포커스된 검색창의 커서 위치 저장
  const activeEl = document.activeElement;
  const activeId = activeEl?.id;
  const cursorPos = activeEl?.selectionStart;

  switch(state.tab) {
    case 0: el.innerHTML = renderDashboard(); break;
    case 1: el.innerHTML = renderDefects(); break;
    case 2: el.innerHTML = renderTests(); break;
    case 3: el.innerHTML = renderCerts(); break;
    case 4: el.innerHTML = renderRequests(); break;
    case 5: el.innerHTML = renderIssues(); break;
    case 6: el.innerHTML = renderMeetings(); break;
    case 7: el.innerHTML = renderReturns(); break;
    case 8: el.innerHTML = renderAnalytics(); initAnalytics(); break;
  }

  // 검색 이벤트 바인딩
  setupSearch($('search-defects'), 'defects.search');
  setupSearch($('search-tests'), 'tests.search');
  setupSearch($('search-certs'), 'certs.search');
  setupSearch($('search-requests'), 'requests.search');
  setupSearch($('search-issues'), 'issues.search');
  setupSearch($('search-meetings'), 'meetings.search');
  setupSearch($('search-returns'), 'returns.search');

  // 포커스 및 커서 위치 복원
  if (activeId) {
    const restored = $(activeId);
    if (restored) {
      restored.focus();
      if (cursorPos !== undefined && restored.setSelectionRange) {
        restored.setSelectionRange(cursorPos, cursorPos);
      }
    }
  }
}

// ─── Issues (이슈사항) ─────────────────────────
function renderIssues() {
  const f = state.filters.issues;
  const items = (state.data.issues||[]).filter(i => {
    if (f.status && i.status !== f.status) return false;
    if (f.category && i.category !== f.category) return false;
    if (f.search) { const s=f.search.toLowerCase(); return [i.title,i.target_line,i.target_product,i.reporter,i.responsible,i.detail].some(v=>(v||'').toLowerCase().includes(s)); }
    return true;
  });
  const all = state.data.issues||[];
  const stats = [
    {label:'전체 이슈',val:all.length,color:'#1E293B',icon:'📋'},
    {label:'대기',val:all.filter(i=>i.status==='대기').length,color:'#F59E0B',icon:'⏳'},

async function saveIssue(editId) {
  const data = {date:$('f-date').value,category:$('f-cat').value,title:$('f-title').value,target_line:$('f-tline').value,target_product:$('f-tproduct').value,detail:$('f-detail').value,cause:$('f-cause').value,impact:$('f-impact').value,action_taken:$('f-ataken').value,action_plan:$('f-aplan').value,status:$('f-status').value,priority:$('f-priority').value,reporter:$('f-reporter').value,responsible:$('f-resp').value,due_date:$('f-due').value,completed_date:$('f-cdate').value,related_dept:$('f-rdept').value,notify_target:$('f-notify').value,notes:$('f-notes').value};
  if(!data.date||!data.title||!data.detail||!data.reporter) return alert('필수 항목을 입력해주세요.');
  let itemId=editId;
  if(editId) {
    const ex=(state.data.issues||[]).find(i=>i.id===editId); let h=[]; try{h=JSON.parse(ex.history||'[]')}catch(e){} h.push({action:'수정',date:nowStr()}); data.history=h;
    await api.update('issues',editId,data);
  } else { itemId=uuid(); data.id=itemId; data.history=[{action:'등록',date:nowStr()}]; await api.create('issues',data); }
  if(pendingFiles.length>0) await api.upload('issues',itemId,pendingFiles);
  closeModal(); await refresh();
}

async function saveReturn(editId) {
  const data = {return_date:$('f-rdate').value,customer:$('f-customer').value,product:$('f-product').value,spec:$('f-spec').value,lot_no:$('f-lotno').value,delivery_date:$('f-ddate').value,return_reason:$('f-reason').value,quantity:$('f-qty').value,claim_detail:$('f-claim').value,inspection_result:$('f-inspect').value,cause:$('f-cause').value,action:$('f-action').value,disposition:$('f-disp').value,status:$('f-status').value,priority:$('f-priority').value,responsible:$('f-resp').value,sales_rep:$('f-sales').value,due_date:$('f-due').value,completed_date:$('f-cdate').value,cost:$('f-cost').value,notes:$('f-notes').value};
  if(!data.return_date||!data.customer||!data.product) return alert('필수 항목을 입력해주세요.');

}

function handleAFile(e, isCompare) {
  const file = e.dataTransfer.files[0];
  if (file) loadAFile(file, isCompare);
}

function parseExcelData(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type:'array', cellDates:true });
  let sheetName = wb.SheetNames.find(n => n.includes('불량발생')) || wb.SheetNames[0];
  const raw = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval:'' });
  return raw.filter(r => {
    const d = r['접수일자'];
    if (!d) return false;
    const dt = (d instanceof Date) ? d : new Date(d);
    return !isNaN(dt.getTime());
  }).map(r => {
    const d = r['접수일자'];
    const dt = (d instanceof Date) ? d : new Date(d);
    return { ...r, _date:dt, _month:dt.getMonth()+1, _year:dt.getFullYear(),
      생산호기:(r['생산호기']||'').toString().trim(), 업체:(r['업체']||'').toString().trim(),
      불량유형:(r['불량유형']||'').toString().trim(), 팀:(r['팀']||'').toString().trim(),
      작업자:(r['작업자']||'').toString().trim(),
    };
  }).filter(r => r.불량유형);
}

function loadAFile(file, isCompare) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = parseExcelData(e.target.result);
    if (isCompare) {
      analyticsCompare = data;
      const el = $('upload-label-comp');
      if(el) el.textContent = '✅ 비교 데이터 로드됨 ('+data.length+'건)';
    } else {
      analyticsData = data;
      analyticsMonth = [];
      const el = $('upload-label-main');
      if(el) el.textContent = '✅ 메인 데이터 로드됨 ('+data.length+'건)';
    }
    renderAnalyticsResult();
  };
  reader.readAsArrayBuffer(file);
}

const CHART_COLORS = ['#3B82F6','#EF4444','#F59E0B','#10B981','#8B5CF6','#EC4899','#06B6D4','#F97316','#6366F1','#14B8A6','#E11D48','#A855F7','#0EA5E9','#84CC16','#D946EF','#78716C','#BE185D','#0D9488','#DC2626','#7C3AED'];
const CHART_COLORS2 = ['#93C5FD','#FCA5A5','#FCD34D','#6EE7B7','#C4B5FD','#F9A8D4','#67E8F9','#FDBA74','#A5B4FC','#5EEAD4'];

function pivot(arr, key) {
  const map = {};
  arr.forEach(r => { const k = r[key] || '미분류'; map[k] = (map[k]||0)+1; });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([name,count])=>({name,count,rate:(count/arr.length*100).toFixed(1)}));
}

// Chart.js 데이터 레이블 플러그인 (자체 구현)
const dataLabelPlugin = {
  id:'customDataLabels',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    const chartArea = chart.chartArea;
    chart.data.datasets.forEach((ds, di) => {
      const meta = chart.getDatasetMeta(di);
      meta.data.forEach((el, i) => {
        const val = ds.data[i];
        if (val === 0 || val === undefined) return;
        ctx.save();

        if (chart.config.type === 'doughnut' || chart.config.type === 'pie') {
          const total = ds.data.reduce((s,v)=>s+v,0);
          const pct = (val/total*100).toFixed(1);
          const pctNum = parseFloat(pct);
          const label = chart.data.labels[i].split(' (')[0].split('팀')[0];
          const arc = el;
          const angleDiff = arc.endAngle - arc.startAngle;
          const angle = (arc.startAngle + arc.endAngle) / 2;
          if (pctNum < 2) { ctx.restore(); return; }
          const outerR = arc.outerRadius;
          const innerR = arc.innerRadius || 0;
          const r = (innerR + outerR) / 2;
          const arcWidth = outerR - innerR;
          const arcLen = angleDiff * r;
          const x = arc.x + Math.cos(angle) * r;
          const y = arc.y + Math.sin(angle) * r;
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const maxW = Math.max(arcLen * 0.85, 30);
          if (pctNum >= 8 && arcLen > 40) {
            // 충분한 공간: 2줄 (이름 + 건수/비율)
            const fs = Math.max(8, Math.min(13, arcLen * 0.18, arcWidth * 0.25));
            ctx.font = `bold ${fs}px Pretendard, sans-serif`;
            ctx.fillText(label, x, y - fs * 0.6, maxW);
            ctx.font = `${Math.max(7, fs - 1)}px Pretendard, sans-serif`;
            ctx.fillText(val+'건('+pct+'%)', x, y + fs * 0.6, maxW);
          } else if (pctNum >= 3 && arcLen > 20) {
            // 좁은 공간: 1줄
            const fs = Math.max(7, Math.min(10, arcLen * 0.15, arcWidth * 0.22));
            ctx.font = `bold ${fs}px Pretendard, sans-serif`;
            ctx.fillText(label+' '+val, x, y, maxW);
          }
        } else if (chart.config.type === 'bar') {
          ctx.fillStyle = '#334155';
          ctx.textBaseline = 'middle';
          const fontSize = Math.max(9, Math.min(11, 11));
          ctx.font = `bold ${fontSize}px Pretendard, sans-serif`;
          if (chart.options.indexAxis === 'y') {
            const maxX = chartArea ? chartArea.right : chart.width;
            const textW = ctx.measureText(val+'건').width;
            if (el.x + 6 + textW > maxX - 4) {
              ctx.fillStyle = '#fff';
              ctx.textAlign = 'right';
              ctx.fillText(val+'건', el.x - 6, el.y);
            } else {
              ctx.textAlign = 'left';
              ctx.fillText(val+'건', el.x + 6, el.y);
            }
          } else {
            ctx.textAlign = 'center';
            const minY = chartArea ? chartArea.top : 0;
            if (el.y - 12 < minY) {
              ctx.fillStyle = '#fff';
              ctx.fillText(val+'건', el.x, el.y + 12);
            } else {
              ctx.fillText(val+'건', el.x, el.y - 10);
            }
          }
        }
        ctx.restore();
      });
    });
  }
};

        plugins:{
          legend:{position:'bottom',labels:{font:{size:11,family:'Pretendard'},padding:10,usePointStyle:true,pointStyleWidth:12}},
          tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.raw+'건'}}
        }
      },
      plugins:[stackLabelPlugin]
    });

    // 불량 유형별 도넛
    new Chart($('chart-type'), {
      type:'doughnut',
      data:{ labels:byType.map(d=>d.name), datasets:[{data:byType.map(d=>d.count),backgroundColor:CHART_COLORS.slice(0,byType.length),borderWidth:2,borderColor:'#fff'}] },
      options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:11,family:'Pretendard'},padding:6,usePointStyle:true,pointStyleWidth:10,generateLabels:chart=>{const ds=chart.data.datasets[0];const total=ds.data.reduce((s,v)=>s+v,0);return chart.data.labels.map((l,i)=>({text:l+' '+ds.data[i]+'건 ('+(ds.data[i]/total*100).toFixed(1)+'%)',fillStyle:ds.backgroundColor[i],strokeStyle:ds.backgroundColor[i],index:i}))}}}}},
      plugins:[dataLabelPlugin]
    });

    // 호기별 수평 막대
    new Chart($('chart-line'), {
      type:'bar',
      data:{ labels:byLine.map(d=>d.name), datasets:[{label:'건수',data:byLine.map(d=>d.count),backgroundColor:CHART_COLORS.slice(0,byLine.length),borderRadius:6,barPercentage:0.7}] },
      options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{display:false}}}},
      plugins:[dataLabelPlugin]
    });

    // 업체별 막대(상위10)
    const topComp = byCompany.slice(0,10);
    new Chart($('chart-company'), {
      type:'bar',
      data:{ labels:topComp.map(d=>d.name), datasets:[{label:'건수',data:topComp.map(d=>d.count),backgroundColor:'#3B82F6',borderRadius:6,barPercentage:0.6}] },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:10}},grid:{display:false}},y:{grid:{color:'#F1F5F9'}}}},
      plugins:[dataLabelPlugin]
    });

    // 팀별 파이
    new Chart($('chart-team'), {
      type:'pie',
      data:{ labels:byTeam.map(d=>(d.name||'미분류')+'팀'), datasets:[{data:byTeam.map(d=>d.count),backgroundColor:CHART_COLORS.slice(0,byTeam.length),borderWidth:2,borderColor:'#fff'}] },
      options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:11,family:'Pretendard'},padding:6,usePointStyle:true,pointStyleWidth:10,generateLabels:chart=>{const ds=chart.data.datasets[0];const total=ds.data.reduce((s,v)=>s+v,0);return chart.data.labels.map((l,i)=>({text:l+' '+ds.data[i]+'건 ('+(ds.data[i]/total*100).toFixed(1)+'%)',fillStyle:ds.backgroundColor[i],strokeStyle:ds.backgroundColor[i],index:i}))}}}}},
      plugins:[dataLabelPlugin]
    });

    // 비교 차트
    if (analyticsCompare && $('chart-compare-line')) {
      const compFiltered = analyticsMonth.length === 0 ? analyticsCompare : analyticsCompare.filter(r => analyticsMonth.includes(r._month));
      const mainYear = [...new Set(filtered.map(r=>r._year))].sort().join('/');
      const compYear = [...new Set(compFiltered.map(r=>r._year))].sort().join('/');
      const allLines = [...new Set([...filtered.map(r=>r.생산호기),...compFiltered.map(r=>r.생산호기)])].filter(Boolean).sort();
      const mainByLine = {};
      filtered.forEach(r=>{if(r.생산호기)mainByLine[r.생산호기]=(mainByLine[r.생산호기]||0)+1;});
      const compByLine = {};
      compFiltered.forEach(r=>{if(r.생산호기)compByLine[r.생산호기]=(compByLine[r.생산호기]||0)+1;});

      new Chart($('chart-compare-line'), {
        type:'bar',
        data:{ labels:allLines, datasets:[
          {label:compYear+'년',data:allLines.map(l=>compByLine[l]||0),backgroundColor:'#93C5FD',borderRadius:4,barPercentage:0.4,categoryPercentage:0.8},
          {label:mainYear+'년',data:allLines.map(l=>mainByLine[l]||0),backgroundColor:'#3B82F6',borderRadius:4,barPercentage:0.4,categoryPercentage:0.8},
        ]},
        options:{responsive:true,plugins:{legend:{position:'top',labels:{font:{size:12,family:'Pretendard'}}}},scales:{x:{grid:{display:false}},y:{grid:{color:'#F1F5F9'}}}},
        plugins:[dataLabelPlugin]
      });

      // 불량유형별 비교
      const allDefTypes = [...new Set([...filtered.map(r=>r.불량유형),...compFiltered.map(r=>r.불량유형)])].filter(Boolean).sort();
      const mainByType = {};
      filtered.forEach(r=>{if(r.불량유형)mainByType[r.불량유형]=(mainByType[r.불량유형]||0)+1;});
      const compByType = {};
      compFiltered.forEach(r=>{if(r.불량유형)compByType[r.불량유형]=(compByType[r.불량유형]||0)+1;});

      new Chart($('chart-compare-type'), {
        type:'bar',
        data:{ labels:allDefTypes, datasets:[
          {label:compYear+'년',data:allDefTypes.map(t=>compByType[t]||0),backgroundColor:'#FCA5A5',borderRadius:4,barPercentage:0.4,categoryPercentage:0.8},
          {label:mainYear+'년',data:allDefTypes.map(t=>mainByType[t]||0),backgroundColor:'#EF4444',borderRadius:4,barPercentage:0.4,categoryPercentage:0.8},
        ]},
        options:{responsive:true,plugins:{legend:{position:'top',labels:{font:{size:12,family:'Pretendard'}}}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{grid:{color:'#F1F5F9'}}}},
        plugins:[dataLabelPlugin]
      });
    }
  }, 100);
}

function downloadAnalyticsExcel() {
  if (!analyticsData) return alert('먼저 엑셀 파일을 업로드하세요.');
  const filtered = analyticsMonth.length === 0 ? analyticsData : analyticsData.filter(r => analyticsMonth.includes(r._month));
  const total = filtered.length;
  const monthLabel = analyticsMonth.length === 0 ? '전체' : analyticsMonth.map(m=>m+'월').join('+');
  const wb = XLSX.utils.book_new();

  // 스타일 정의
  const titleStyle = {font:{bold:true,sz:14,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1E40AF'}},alignment:{horizontal:'center',vertical:'center'},border:{top:{style:'thin',color:{rgb:'000000'}},bottom:{style:'thin',color:{rgb:'000000'}},left:{style:'thin',color:{rgb:'000000'}},right:{style:'thin',color:{rgb:'000000'}}}};
  const headerStyle = {font:{bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'334155'}},alignment:{horizontal:'center',vertical:'center'},border:{top:{style:'thin',color:{rgb:'94A3B8'}},bottom:{style:'thin',color:{rgb:'94A3B8'}},left:{style:'thin',color:{rgb:'94A3B8'}},right:{style:'thin',color:{rgb:'94A3B8'}}}};
  const dataStyle = {font:{sz:10},alignment:{horizontal:'center',vertical:'center'},border:{top:{style:'thin',color:{rgb:'E2E8F0'}},bottom:{style:'thin',color:{rgb:'E2E8F0'}},left:{style:'thin',color:{rgb:'E2E8F0'}},right:{style:'thin',color:{rgb:'E2E8F0'}}}};
  const dataLeftStyle = {...dataStyle,alignment:{horizontal:'left',vertical:'center'}};
  const dataBoldStyle = {font:{bold:true,sz:10},alignment:{horizontal:'center',vertical:'center'},border:dataStyle.border};
  const totalRowStyle = {font:{bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1E40AF'}},alignment:{horizontal:'center',vertical:'center'},border:{top:{style:'thin',color:{rgb:'000000'}},bottom:{style:'thin',color:{rgb:'000000'}},left:{style:'thin',color:{rgb:'000000'}},right:{style:'thin',color:{rgb:'000000'}}}};
  const pctStyle = {font:{sz:10},alignment:{horizontal:'center',vertical:'center'},border:dataStyle.border,numFmt:'0.0"%"'};
  const evenRowFill = {fill:{fgColor:{rgb:'F8FAFC'}}};

  function styledPivotSheet(title, data, col1Name) {
    const aoa = [[`📊 ${monthLabel} ${title}`,'',''],['','',' '],[col1Name,'건수','비율(%)']];
    data.forEach(d => aoa.push([d.name, d.count, parseFloat(d.rate)]));
    aoa.push(['합계', total, 100.0]);
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:2}}];
    ws['!cols'] = [{wch:20},{wch:12},{wch:12}];
    // 타이틀 행
    for(let c=0;c<3;c++){const addr=XLSX.utils.encode_cell({r:0,c});if(ws[addr])ws[addr].s=titleStyle;}
    // 헤더 행
    for(let c=0;c<3;c++){const addr=XLSX.utils.encode_cell({r:2,c});if(ws[addr])ws[addr].s=headerStyle;}
    // 데이터 행
    for(let r=3;r<3+data.length;r++){
      const isEven=(r-3)%2===0;
      for(let c=0;c<3;c++){
        const addr=XLSX.utils.encode_cell({r,c});
        if(!ws[addr])continue;
        if(c===0)ws[addr].s={...dataLeftStyle,...(isEven?evenRowFill:{})};
        else if(c===2)ws[addr].s={...pctStyle,...(isEven?evenRowFill:{})};
        else ws[addr].s={...dataBoldStyle,...(isEven?evenRowFill:{})};
      }
    }
    // 합계 행
    const tr=3+data.length;
    for(let c=0;c<3;c++){const addr=XLSX.utils.encode_cell({r:tr,c});if(ws[addr])ws[addr].s=totalRowStyle;}
    return ws;
  }

  function styledCrossSheet(title, crossData, col1Name) {
    const allTypes = [...new Set(filtered.map(r=>r.불량유형))].sort();
    const entries = Object.entries(crossData).sort((a,b)=>Object.values(b[1]).reduce((s,v)=>s+v,0)-Object.values(a[1]).reduce((s,v)=>s+v,0));
    const aoa = [[`📊 ${monthLabel} ${title}`,...Array(allTypes.length+1).fill('')],['',...Array(allTypes.length+1).fill('')],[col1Name,...allTypes,'합계']];
    entries.forEach(([n,t])=>{const row=[n,...allTypes.map(x=>t[x]||0)];row.push(Object.values(t).reduce((s,v)=>s+v,0));aoa.push(row);});
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:allTypes.length+1}}];
    ws['!cols'] = [{wch:16},...allTypes.map(()=>({wch:10})),{wch:10}];
    for(let c=0;c<allTypes.length+2;c++){const a1=XLSX.utils.encode_cell({r:0,c});if(ws[a1])ws[a1].s=titleStyle;const a2=XLSX.utils.encode_cell({r:2,c});if(ws[a2])ws[a2].s=headerStyle;}
    for(let r=3;r<3+entries.length;r++){
      const isEven=(r-3)%2===0;
      for(let c=0;c<allTypes.length+2;c++){
        const addr=XLSX.utils.encode_cell({r,c});
        if(!ws[addr])continue;
        if(c===0)ws[addr].s={...dataLeftStyle,...(isEven?evenRowFill:{})};
        else if(c===allTypes.length+1)ws[addr].s={...dataBoldStyle,font:{bold:true,sz:10,color:{rgb:'1E40AF'}},...(isEven?evenRowFill:{})};
        else{const v=ws[addr].v;ws[addr].s={...(v&&v>0?dataBoldStyle:dataStyle),...(isEven?evenRowFill:{})};}
      }
    }
    return ws;
  }

  const byType = pivot(filtered,'불량유형');
  XLSX.utils.book_append_sheet(wb, styledPivotSheet('불량 유형별 집계',byType,'불량유형'), '불량유형별');
  const byLine = pivot(filtered,'생산호기');
  XLSX.utils.book_append_sheet(wb, styledPivotSheet('호기별 불량 집계',byLine,'호기'), '호기별');
  const byComp = pivot(filtered,'업체');
  XLSX.utils.book_append_sheet(wb, styledPivotSheet('업체별 불량 집계',byComp,'업체'), '업체별');
  const byTeam = pivot(filtered,'팀');
  XLSX.utils.book_append_sheet(wb, styledPivotSheet('팀별 불량 건수 및 비율',byTeam.map(d=>({...d,name:d.name||'미분류'})),'팀'), '팀별');

  const allTypes = [...new Set(filtered.map(r=>r.불량유형))].sort();
  const lineTypes = {};
  filtered.forEach(r=>{const l=r.생산호기||'미분류';if(!lineTypes[l])lineTypes[l]={};lineTypes[l][r.불량유형||'미분류']=(lineTypes[l][r.불량유형||'미분류']||0)+1;});
  XLSX.utils.book_append_sheet(wb, styledCrossSheet('Worst 호기별 불량유형 상세',lineTypes,'호기'), 'Worst호기별');

  const compTypes = {};
  filtered.forEach(r=>{const c=r.업체||'미분류';if(!compTypes[c])compTypes[c]={};compTypes[c][r.불량유형||'미분류']=(compTypes[c][r.불량유형||'미분류']||0)+1;});
  XLSX.utils.book_append_sheet(wb, styledCrossSheet('Worst 업체별 불량유형 상세',compTypes,'업체'), 'Worst업체별');

  if (analyticsCompare) {
    const compFiltered = analyticsMonth.length === 0 ? analyticsCompare : analyticsCompare.filter(r => analyticsMonth.includes(r._month));
    if (compFiltered.length > 0) {
      const mainYear = [...new Set(filtered.map(r=>r._year))].sort().join('/');
      const compYear = [...new Set(compFiltered.map(r=>r._year))].sort().join('/');
      const allLines = [...new Set([...filtered.map(r=>r.생산호기),...compFiltered.map(r=>r.생산호기)])].filter(Boolean).sort();
      const allDT = [...new Set([...filtered.map(r=>r.불량유형),...compFiltered.map(r=>r.불량유형)])].filter(Boolean).sort();
      const hdr1 = ['호기'];
      const hdr2 = [''];
      allDT.forEach(t=>{hdr1.push(t,'');hdr2.push(compYear+'년',mainYear+'년');});
      hdr1.push('합계','');hdr2.push(compYear+'년',mainYear+'년');
      const aoa = [[`🔄 ${monthLabel} 연도별 비교 (${compYear} vs ${mainYear})`,...Array(allDT.length*2+2).fill('')],[''],hdr1,hdr2];
      const mLD={},cLD={};
      filtered.forEach(r=>{const l=r.생산호기;if(!l)return;if(!mLD[l])mLD[l]={};mLD[l][r.불량유형]=(mLD[l][r.불량유형]||0)+1;});
      compFiltered.forEach(r=>{const l=r.생산호기;if(!l)return;if(!cLD[l])cLD[l]={};cLD[l][r.불량유형]=(cLD[l][r.불량유형]||0)+1;});
      allLines.forEach(l=>{
        const row=[l];
        allDT.forEach(t=>{row.push((cLD[l]||{})[t]||0);row.push((mLD[l]||{})[t]||0);});
        row.push(Object.values(cLD[l]||{}).reduce((s,v)=>s+v,0));
        row.push(Object.values(mLD[l]||{}).reduce((s,v)=>s+v,0));
        aoa.push(row);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      const totalCols = allDT.length*2+3;
      ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:totalCols-1}}];
      // 불량유형별 병합
      for(let i=0;i<allDT.length;i++){ws['!merges'].push({s:{r:2,c:1+i*2},e:{r:2,c:2+i*2}});}
      ws['!merges'].push({s:{r:2,c:1+allDT.length*2},e:{r:2,c:2+allDT.length*2}});
      ws['!cols'] = [{wch:12},...Array(totalCols-1).fill({wch:10})];
      // 스타일 적용
      for(let c=0;c<totalCols;c++){const a=XLSX.utils.encode_cell({r:0,c});if(ws[a])ws[a].s=titleStyle;}
      for(let c=0;c<totalCols;c++){const a=XLSX.utils.encode_cell({r:2,c});if(ws[a])ws[a].s=headerStyle;}
      for(let c=0;c<totalCols;c++){const a=XLSX.utils.encode_cell({r:3,c});if(ws[a])ws[a].s={...headerStyle,fill:{fgColor:{rgb:'475569'}}};}
      for(let r=4;r<4+allLines.length;r++){
        const isEven=(r-4)%2===0;
        for(let c=0;c<totalCols;c++){
          const addr=XLSX.utils.encode_cell({r,c});
          if(!ws[addr])continue;
          if(c===0)ws[addr].s={...dataLeftStyle,...(isEven?evenRowFill:{})};
          else{const v=ws[addr].v;ws[addr].s={...(v&&v>0?dataBoldStyle:dataStyle),...(isEven?evenRowFill:{})};}
        }
      }
      XLSX.utils.book_append_sheet(wb, ws, '연도비교_호기별');
    }
  }

  XLSX.writeFile(wb, `불량집계_${monthLabel}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

async function downloadChartExcel() {
  if (!analyticsData) return alert('먼저 엑셀 파일을 업로드하세요.');
  const filtered = analyticsMonth.length === 0 ? analyticsData : analyticsData.filter(r => analyticsMonth.includes(r._month));
  const total = filtered.length;
  const monthLabel = analyticsMonth.length === 0 ? '전체' : analyticsMonth.map(m=>m+'월').join('+');
  const byType = pivot(filtered,'불량유형');
  const byLine = pivot(filtered,'생산호기');
  const byCompany = pivot(filtered,'업체');
  const byTeam = pivot(filtered,'팀');
  const lineTypes = {};
  filtered.forEach(r=>{const l=r.생산호기||'미분류';if(!lineTypes[l])lineTypes[l]={};lineTypes[l][r.불량유형||'미분류']=(lineTypes[l][r.불량유형||'미분류']||0)+1;});

  try {
    const resp = await fetch('/api/analytics/excel-chart', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({monthLabel, total, byType, byLine, byCompany, byTeam, lineTypes})
    });
    if (!resp.ok) { const err = await resp.json(); alert('오류: '+(err.error||'서버 에러')); return; }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `불량집계_${monthLabel}_${new Date().toISOString().slice(0,10)}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('차트 포함 엑셀은 서버(PythonAnywhere)에서만 지원됩니다.\n로컬 EXE에서는 일반 엑셀 다운로드를 사용하세요.'); }
}

// ─── Delete ─────────────────────────
async function deleteItem(t,id) { if(!confirm('삭제하시겠습니까?')) return; await api.remove(t,id); await refresh(); }

// ─── Refresh ─────────────────────────
async function refresh() { await loadAll(); renderTabs(); renderContent(); }

// ─── Init ─────────────────────────
(async function() { await loadAll(); renderTabs(); renderContent(); })();
</script>
